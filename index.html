    function useInView(threshold = 0.12) {
      const ref = useRef(null);
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVisible(true); obs.disconnect(); } }, { threshold });
        if (ref.current) obs.observe(ref.current);
        return () => obs.disconnect();
      }, []);
      return [ref, visible];
    }

    function Fade({ children, delay = 0 }) {
      const [ref, visible] = useInView();
      return (
        <div ref={ref} style={{
          opacity: visible ? 1 : 0,
          transform: visible ? "translateY(0)" : "translateY(22px)",
          transition: `opacity 0.6s ease ${delay}s, transform 0.6s ease ${delay}s`,
        }}>{children}</div>
      );
    }

        const fn = () => setScrolled(window.scrollY > 40);
        window.addEventListener("scroll", fn);
        return () => window.removeEventListener("scroll", fn);
      }, []);

          padding: "0 2rem", height: "60px",

                  onMouseLeave={e => e.target.style.color = "var(--ink2)"}

                <div style={{ background: "var(--card)", border: "1px solid var(--border)", borderRadius: "10px", padding: "1.25rem 1.5rem" }}>
                  <span style={{ fontFamily: "'DM Mono',monospace", fontSize: "11px", color: "var(--accent)", fontWeight: 500, letterSpacing: "0.05em", display: "block", marginBottom: "0.75rem" }}>{cat.toUpperCase()}</span>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: "0.4rem" }}>
                    {items.map(skill => (
                      <span key={skill} style={{ fontSize: "13px", color: "var(--ink2)", padding: "4px 10px", background: "var(--bg)", borderRadius: "5px", border: "1px solid var(--border)" }}>{skill}</span>
                    ))}
                  </div>
                </div>
              </Fade>
            ))}
          </div>
        </section>
      );
    }

    function Contact({ t }) {
      return (
        <section id="contact" style={{ padding: "5rem 2rem 8rem", maxWidth: "900px", margin: "0 auto" }}>
          <Fade>
            <div style={{ background: "var(--accent)", borderRadius: "16px", padding: "3rem", textAlign: "center" }}>
              <span style={{ fontFamily: "'DM Mono',monospace", fontSize: "12px", color: "rgba(255,255,255,0.6)", letterSpacing: "0.1em" }}>{t.contactLabel}</span>
              <h2 style={{ fontFamily: "'DM Serif Display',serif", fontSize: "2.2rem", fontWeight: 400, color: "#fff", margin: "0.5rem 0 1rem" }}>{t.contactTitle}</h2>
              <p style={{ color: "rgba(255,255,255,0.8)", fontSize: "15px", marginBottom: "2rem" }}>{t.contactSub}</p>
              <div style={{ display: "flex", gap: "1rem", justifyContent: "center", flexWrap: "wrap" }}>
                <a href="mailto:herrerabenavidestomasesteban@gmail.com" style={{ padding: "0.7rem 1.6rem", background: "#fff", color: "var(--accent)", borderRadius: "6px", fontSize: "14px", fontWeight: 500, transition: "opacity 0.2s" }}
                  onMouseEnter={e => e.target.style.opacity="0.9"} onMouseLeave={e => e.target.style.opacity="1"}
                >{t.emailBtn}</a>
                {[["LinkedIn","https://www.linkedin.com/in/tomas-esteban-herrera-benavides"],["GitHub","https://github.com/Tomas1022"]].map(([label, href]) => (
                  <a key={label} href={href} target="_blank" rel="noopener"
                    style={{ padding: "0.7rem 1.6rem", border: "1px solid rgba(255,255,255,0.4)", color: "#fff", borderRadius: "6px", fontSize: "14px", transition: "border-color 0.2s" }}
                    onMouseEnter={e => e.target.style.borderColor="#fff"} onMouseLeave={e => e.target.style.borderColor="rgba(255,255,255,0.4)"}
                  >{label}</a>
                ))}
              </div>
            </div>
          </Fade>
        </section>
      );
    }

    function Footer({ t }) {
      return (
        <footer style={{ borderTop: "1px solid var(--border)", padding: "1.5rem 2rem", display: "flex", justifyContent: "space-between", alignItems: "center", maxWidth: "900px", margin: "0 auto" }}>
          <span style={{ fontFamily: "'DM Mono',monospace", fontSize: "12px", color: "var(--ink3)" }}>© 2026 Tomas Herrera</span>
          <span style={{ fontFamily: "'DM Mono',monospace", fontSize: "12px", color: "var(--ink3)" }}>Bogotá, Colombia</span>
        </footer>
      );
    }

    function App() {
      const [lang, setLang] = useState("en");
      const [dark, setDark] = useState(false);
      const t = T[lang];
      return (
        <>
          <Nav lang={lang} setLang={setLang} dark={dark} setDark={setDark} t={t} />
          <Hero t={t} />
          <Experience t={t} />
          <Projects t={t} />
          <Skills t={t} />
          <Contact t={t} />
          <Footer t={t} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
